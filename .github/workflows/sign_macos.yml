name: Sign macOS artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v1.4.8'

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Download artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.tag }}" \
            --pattern "Aster-Mail-universal.app.tar.gz" \
            --dir /tmp/art --clobber

      - name: Sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm install --no-save @tauri-apps/cli@^2.10.1
          npx tauri signer sign /tmp/art/Aster-Mail-universal.app.tar.gz
          echo "--- sig ---"
          cat /tmp/art/Aster-Mail-universal.app.tar.gz.sig

      - name: Update latest.json and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release download "$TAG" --pattern latest.json --dir /tmp/json --clobber

          SIG=$(cat /tmp/art/Aster-Mail-universal.app.tar.gz.sig | base64 -w0)
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Aster-Mail-universal.app.tar.gz"

          python3 - "$SIG" "$URL" /tmp/json/latest.json << 'EOF'
          import json, sys
          sig, url, path = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path) as f:
              d = json.load(f)
          entry = {'signature': sig, 'url': url}
          d['platforms']['darwin-universal'] = entry
          d['platforms']['darwin-aarch64']   = entry
          d['platforms']['darwin-x86_64']    = entry
          with open(path, 'w') as f:
              json.dump(d, f, indent=2)
          print('platforms:', list(d['platforms'].keys()))
          EOF

          gh release upload "$TAG" \
            /tmp/art/Aster-Mail-universal.app.tar.gz.sig \
            /tmp/json/latest.json \
            --clobber
