name: Sign macOS artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v1.4.9'

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Download artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.tag }}" \
            --pattern "Aster-Mail-universal.app.tar.gz" \
            --dir /tmp/art --clobber

      - name: Sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm install --no-save @tauri-apps/cli@^2.10.1
          npx tauri signer sign /tmp/art/Aster-Mail-universal.app.tar.gz
          cat /tmp/art/Aster-Mail-universal.app.tar.gz.sig

      - name: Update latest.json and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release download "$TAG" --pattern latest.json --dir /tmp/json --clobber 2>/dev/null \
            || (mkdir -p /tmp/json && echo '{"version":"","notes":"","pub_date":"","platforms":{}}' > /tmp/json/latest.json)

          python3 - "$TAG" /tmp/json/latest.json /tmp/art/Aster-Mail-universal.app.tar.gz.sig << 'EOF'
import json, base64, sys
tag, path, sig_path = sys.argv[1], sys.argv[2], sys.argv[3]
with open(path) as f: d = json.load(f)
with open(sig_path) as f: sig = f.read().strip()
sig_b64 = base64.b64encode(sig.encode()).decode()
url = f'https://github.com/Aster-Privacy/Aster-Mail/releases/download/{tag}/Aster-Mail-universal.app.tar.gz'
entry = {'signature': sig_b64, 'url': url}
d['platforms']['darwin-universal'] = entry
d['platforms']['darwin-aarch64']   = entry
d['platforms']['darwin-x86_64']    = entry
with open(path, 'w') as f: json.dump(d, f, indent=2)
print('platforms:', list(d['platforms'].keys()))
EOF

          gh release upload "$TAG" \
            /tmp/art/Aster-Mail-universal.app.tar.gz.sig \
            /tmp/json/latest.json \
            --clobber
