<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <script src="/theme-bootstrap.js"></script>
    <script src="/tauri-crypto-shim.js"></script>
    <style>
      html, body { background-color: #ffffff; }
      html.dark, html.dark body { background-color: #0a0a0a; }
      @font-face {
        font-family: 'Google Sans Flex';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/GoogleSansFlex-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Google Sans Flex';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/GoogleSansFlex-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Google Sans Flex';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/GoogleSansFlex-600.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Google Sans Flex';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/GoogleSansFlex-700.woff2') format('woff2');
      }
      html, body { font-family: 'Google Sans Flex', system-ui, sans-serif; }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        z-index: 10000;
      }
      html.dark #initial-loader {
        background-color: #0a0a0a;
      }
      #initial-loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #initial-loader-content img {
        height: 1.75rem;
        user-select: none;
        -webkit-user-drag: none;
      }
      #initial-loader-spinner {
        width: 24px !important;
        height: 24px !important;
        min-width: 24px !important;
        min-height: 24px !important;
        border: 2.5px solid rgba(0, 0, 0, 0.08) !important;
        border-top-color: rgba(0, 0, 0, 0.5) !important;
        border-radius: 50% !important;
        animation: initial-loader-spin 0.7s linear infinite !important;
        flex-shrink: 0 !important;
        box-sizing: border-box !important;
      }
      html.dark #initial-loader-spinner {
        border-color: rgba(255, 255, 255, 0.15) !important;
        border-top-color: rgba(255, 255, 255, 0.7) !important;
      }
      @keyframes initial-loader-spin {
        to { transform: rotate(360deg); }
      }
      @font-face {
        font-family: 'OpenDyslexic';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/OpenDyslexic-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'OpenDyslexic';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/OpenDyslexic-Bold.woff2') format('woff2');
      }
    </style>
    <link rel="preload" as="image" href="/text_logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Aster Mail</title>
    <meta
      key="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0"
      name="viewport"
    />
  </head>
  <body>
    <div id="initial-loader">
      <div id="initial-loader-content">
        <img alt="Aster" src="/text_logo.png" />
        <div id="initial-loader-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script src="/font-loader.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
